<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Black Crime Files</title>

  <style>

    body{
      margin:0;
      padding:20px;
      font-family:Arial;
      background:linear-gradient(to bottom right,#0f172a,#581c87,#000);
      color:white;
      min-height:100vh;
    }

    .container{
      max-width:1100px;
      margin:auto;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:25px;
      padding:25px;
      backdrop-filter:blur(10px);
      box-shadow:0 0 30px rgba(0,0,0,0.5);
    }

    .top-bar{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:15px;
      flex-wrap:wrap;
      margin-bottom:25px;
    }

    .name-btn{
      padding:14px 26px;
      border-radius:16px;
      background:linear-gradient(135deg,#ec4899,#8b5cf6);
      color:white;
      font-size:18px;
      font-weight:bold;
      border:none;
      box-shadow:0 0 20px rgba(236,72,153,0.4);
      transition:0.3s;
      cursor:pointer;
    }

    .name-btn:hover{
      transform:translateY(-3px) scale(1.03);
      box-shadow:0 0 30px rgba(236,72,153,0.7);
    }

    .linkedin-btn{
      text-decoration:none;
      padding:14px 26px;
      border-radius:16px;
      background:linear-gradient(135deg,#0ea5e9,#2563eb);
      color:white;
      font-size:17px;
      font-weight:bold;
      box-shadow:0 0 20px rgba(37,99,235,0.5);
      transition:0.3s;
      display:inline-block;
    }

    .linkedin-btn:hover{
      transform:translateY(-3px) scale(1.03);
      box-shadow:0 0 30px rgba(37,99,235,0.8);
    }

    .header{
      text-align:center;
      margin-bottom:30px;
    }

    .header h1{
      font-size:42px;
      margin-bottom:10px;
    }

    .header p{
      color:#f9a8d4;
      font-size:18px;
    }

    .start-screen{
      text-align:center;
      padding:60px 20px;
    }

    .start-screen input{
      width:300px;
      max-width:90%;
      padding:14px;
      border:none;
      border-radius:12px;
      margin-top:20px;
      font-size:16px;
      outline:none;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:20px;
    }

    .box{
      background:rgba(255,255,255,0.05);
      border-radius:20px;
      padding:20px;
      border:1px solid rgba(255,255,255,0.08);
      transition:0.3s;
    }

    .box:hover{
      transform:translateY(-5px);
      box-shadow:0 0 25px rgba(255,255,255,0.08);
    }

    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:12px;
      background:#7c3aed;
      color:white;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    button:hover{
      background:#9333ea;
      transform:scale(1.03);
    }

    .suspect-btn:disabled{
      opacity:0.5;
      cursor:not-allowed;
      transform:none;
      background:#374151;
    }

    #result{
      text-align:center;
      margin-top:20px;
      font-size:24px;
      font-weight:bold;
    }

    #nextBtn{
      display:none;
      margin-top:20px;
    }

    @media(max-width:900px){

      .grid{
        grid-template-columns:1fr;
      }

      .top-bar{
        flex-direction:column;
      }

    }

  </style>
</head>

<body>

<div class="container">

  <div class="top-bar">

    <button class="name-btn">
      Shahd Abu nofal ♡
    </button>

    <a
      class="linkedin-btn"
      href="https://www.linkedin.com/in/shahd-abu-nofal-3008a83a9?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app"
      target="_blank"
    >
      LinkedIn Profile 🔗
    </a>

  </div>

  <!-- Start Screen -->

  <div id="startScreen" class="start-screen">

    <h1>🕵️ Black Crime Files</h1>

    <p>Enter Your Detective Name</p>

    <input type="text" id="playerName" placeholder="Your Name">

    <br>

    <button onclick="startGame()" style="width:300px;max-width:90%;">
      Start Game 🎮
    </button>

  </div>

  <!-- Game Screen -->

  <div id="gameScreen" style="display:none;">

    <div class="header">

      <h1>🕵️ Black Crime Files</h1>

      <p id="welcome"></p>

    </div>

    <div class="grid">

      <!-- Clues -->

      <div class="box">

        <h2>🔎 Clues</h2>

        <div id="clues"></div>

      </div>

      <!-- Case -->

      <div class="box" style="text-align:center;">

        <h2 id="title"></h2>

        <p id="intro"></p>

        <h3>⏳ <span id="time">30</span>s</h3>

        <h3>⭐ Score: <span id="score">0</span></h3>

        <h3>📂 Case <span id="caseNum">1</span>/5</h3>

      </div>

      <!-- Suspects -->

      <div class="box">

        <h2>👤 Suspects</h2>

        <div id="suspects"></div>

      </div>

    </div>

    <div id="result"></div>

    <button id="nextBtn" onclick="nextCase()">
      Next Case ➡️
    </button>

  </div>

</div>

<script>

let player = "";

function startGame(){

  player = document.getElementById("playerName").value;

  if(player.trim() === ""){

    alert("Please enter your name");
    return;

  }

  document.getElementById("startScreen").style.display = "none";

  document.getElementById("gameScreen").style.display = "block";

  document.getElementById("welcome").innerHTML =
    `Welcome Detective ${player} 🔥`;

  loadCase();

}

const cases = [

{
  title:"🔥 Harbor Explosion",

  intro:"A mysterious explosion happened at the harbor.",

  clues:[
    "Cameras were disabled",
    "A timer device was found",
    "Someone escaped toward the ship"
  ],

  suspects:[
    {name:"Ship Captain", guilty:false},
    {name:"Systems Engineer", guilty:true},
    {name:"Harbor Guard", guilty:false}
  ]
},

{
  title:"⚔️ Kidnapping Downtown",

  intro:"A child disappeared from a secured building.",

  clues:[
    "No broken doors",
    "Security system disabled",
    "Encrypted ransom message"
  ],

  suspects:[
    {name:"Security Guard", guilty:true},
    {name:"Driver", guilty:false},
    {name:"Neighbor", guilty:false}
  ]
},

{
  title:"💰 Bank Robbery",

  intro:"Millions disappeared from the city bank.",

  clues:[
    "Vault opened from inside",
    "Fingerprint on control panel",
    "Escape car found burned"
  ],

  suspects:[
    {name:"Bank Manager", guilty:false},
    {name:"IT Employee", guilty:true},
    {name:"Cleaner", guilty:false}
  ]
},

{
  title:"🧬 Secret Laboratory",

  intro:"A scientist vanished from a secret lab.",

  clues:[
    "Hidden files deleted",
    "Lab cameras hacked",
    "Unknown chemical traces"
  ],

  suspects:[
    {name:"Researcher", guilty:true},
    {name:"Assistant", guilty:false},
    {name:"Guard", guilty:false}
  ]
},

{
  title:"🚔 Serial Killer Case",

  intro:"A dangerous serial killer left another clue.",

  clues:[
    "A bloody glove was found",
    "Victim received threats",
    "Suspicious car near the scene"
  ],

  suspects:[
    {name:"Taxi Driver", guilty:false},
    {name:"Ex-Friend", guilty:true},
    {name:"Store Owner", guilty:false}
  ]
}

];

let currentCase = 0;
let score = 0;
let wrongAnswers = 0;
let time = 30;
let timer;
let answered = false;

function loadCase(){

  clearInterval(timer);

  answered = false;

  const c = cases[currentCase];

  document.getElementById("title").innerText = c.title;

  document.getElementById("intro").innerText = c.intro;

  document.getElementById("caseNum").innerText = currentCase + 1;

  const cluesDiv = document.getElementById("clues");

  cluesDiv.innerHTML = "";

  c.clues.forEach(clue=>{

    cluesDiv.innerHTML += `<p>• ${clue}</p>`;

  });

  const suspectsDiv = document.getElementById("suspects");

  suspectsDiv.innerHTML = "";

  c.suspects.forEach(s=>{

    suspectsDiv.innerHTML += `
      <button 
        class="suspect-btn"
        onclick="checkAnswer(${s.guilty})"
      >
        ${s.name}
      </button>
    `;

  });

  document.getElementById("result").innerHTML = "";

  document.getElementById("nextBtn").style.display = "none";

  time = 30;

  document.getElementById("time").innerText = time;

  timer = setInterval(()=>{

    time--;

    document.getElementById("time").innerText = time;

    if(time <= 0){

      clearInterval(timer);

      wrongAnswers++;

      disableAllButtons();

      document.getElementById("result").innerHTML =
        "⏰ Time Over!";

      document.getElementById("nextBtn").style.display =
        "block";

    }

  },1000);

}

function disableAllButtons(){

  const buttons = document.querySelectorAll(".suspect-btn");

  buttons.forEach(btn=>{

    btn.disabled = true;

  });

}

function checkAnswer(correct){

  // يمنع اختيار أكثر من مرة

  if(answered) return;

  answered = true;

  clearInterval(timer);

  disableAllButtons();

  if(correct){

    score++;

    document.getElementById("score").innerText = score;

    document.getElementById("result").innerHTML =
      "✔️ Correct! Case Solved.";

  }

  else{

    wrongAnswers++;

    document.getElementById("result").innerHTML =
      "❌ Wrong Choice! The criminal escaped.";

  }

  document.getElementById("nextBtn").style.display =
    "block";

}

function nextCase(){

  currentCase++;

  if(currentCase >= cases.length){

    let message = "";

    if(score === 5){

      message =
        "🏆 Perfect Detective! You solved every case.";

    }

    else if(score === 4){

      message =
        "🔥 Amazing work detective.";

    }

    else if(score === 3){

      message =
        "🕵️ Good job! Some criminals escaped.";

    }

    else if(score === 2){

      message =
        "⚠️ You solved a few cases, but many failed.";

    }

    else{

      message =
        "❌ Mission Failed. Better luck next time.";

    }

    document.querySelector(".container").innerHTML = `

      <div class="top-bar">

        <button class="name-btn">
          Shahd Abu nofal ♡
        </button>

        <a
          class="linkedin-btn"
          href="https://www.linkedin.com/in/shahd-abu-nofal-3008a83a9?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app"
          target="_blank"
        >
          LinkedIn Profile 🔗
        </a>

      </div>

      <div style="text-align:center;padding:50px;">

        <h1>🎮 Game Finished</h1>

        <h2>${player}'s Final Results</h2>

        <h1 style="
          font-size:70px;
          color:#facc15;
        ">
          ${score}/5
        </h1>

        <p style="
          font-size:22px;
          margin-top:20px;
          color:#f87171;
        ">
          Wrong Answers: ${wrongAnswers}
        </p>

        <p style="
          font-size:24px;
          margin-top:20px;
          color:#f9a8d4;
        ">
          ${message}
        </p>

      </div>

    `;

    return;

  }

  loadCase();

}

</script>

</body>
    </html>
