<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Black Crime Files</title>

  <style>

    body{
      margin:0;
      padding:20px;
      font-family:Arial;
      background:linear-gradient(to bottom right,#0f172a,#581c87,#000);
      color:white;
      min-height:100vh;
    }

    .container{
      max-width:1100px;
      margin:auto;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:25px;
      padding:25px;
      backdrop-filter:blur(10px);
      box-shadow:0 0 30px rgba(0,0,0,0.5);
    }

    .header{
      text-align:center;
      margin-bottom:30px;
    }

    .header h1{
      font-size:42px;
      margin-bottom:10px;
    }

    .header p{
      color:#f9a8d4;
      font-size:18px;
    }

    .start-screen{
      text-align:center;
      padding:60px 20px;
    }

    .start-screen input{
      width:300px;
      max-width:90%;
      padding:14px;
      border:none;
      border-radius:12px;
      margin-top:20px;
      font-size:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:20px;
    }

    .box{
      background:rgba(255,255,255,0.05);
      border-radius:20px;
      padding:20px;
      border:1px solid rgba(255,255,255,0.08);
    }

    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:12px;
      background:#7c3aed;
      color:white;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    button:hover{
      background:#9333ea;
      transform:scale(1.03);
    }

    #result{
      text-align:center;
      margin-top:20px;
      font-size:24px;
      font-weight:bold;
    }

    #nextBtn{
      display:none;
      margin-top:20px;
    }

    @media(max-width:900px){

      .grid{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

<div class="container">

  <!-- شاشة البداية -->

  <div id="startScreen" class="start-screen">

    <h1>🕵️ Black Crime Files</h1>

    <p>Enter Your Detective Name</p>

    <input type="text" id="playerName" placeholder="Your Name">

    <br>

    <button onclick="startGame()" style="width:300px;max-width:90%;">
      Start Game 🎮
    </button>

  </div>

  <!-- اللعبة -->

  <div id="gameScreen" style="display:none;">

    <div class="header">

      <h1>🕵️ Black Crime Files</h1>

      <p id="welcome"></p>

    </div>

    <div class="grid">

      <!-- الأدلة -->

      <div class="box">

        <h2>🔎 Clues</h2>

        <div id="clues"></div>

      </div>

      <!-- القضية -->

      <div class="box" style="text-align:center;">

        <h2 id="title"></h2>

        <p id="intro"></p>

        <h3>⏳ <span id="time">30</span>s</h3>

        <h3>⭐ Score: <span id="score">0</span></h3>

        <h3>📂 Case <span id="caseNum">1</span>/5</h3>

      </div>

      <!-- المشتبه بهم -->

      <div class="box">

        <h2>👤 Suspects</h2>

        <div id="suspects"></div>

      </div>

    </div>

    <div id="result"></div>

    <button id="nextBtn" onclick="nextCase()">
      Next Case ➡️
    </button>

  </div>

</div>

<script>

let player = "";

function startGame(){

  player = document.getElementById("playerName").value;

  if(player.trim() === ""){

    alert("Please enter your name");

    return;
  }

  document.getElementById("startScreen").style.display =
    "none";

  document.getElementById("gameScreen").style.display =
    "block";

  document.getElementById("welcome").innerHTML =
    `Welcome Detective ${player} 🔥`;

  loadCase();
}

const cases = [

{
  title:"🔥 Harbor Explosion",

  intro:"A mysterious explosion happened at the harbor.",

  clues:[
    "Cameras were disabled",
    "A timer device was found",
    "Someone escaped toward the ship"
  ],

  suspects:[
    {name:"Ship Captain", guilty:false},
    {name:"Systems Engineer", guilty:true},
    {name:"Harbor Guard", guilty:false}
  ]
},

{
  title:"⚔️ Kidnapping Downtown",

  intro:"A child disappeared from a secured building.",

  clues:[
    "No broken doors",
    "Security system disabled",
    "Encrypted ransom message"
  ],

  suspects:[
    {name:"Security Guard", guilty:true},
    {name:"Driver", guilty:false},
    {name:"Neighbor", guilty:false}
  ]
},

{
  title:"💰 Bank Robbery",

  intro:"Millions disappeared from the city bank.",

  clues:[
    "Vault opened from inside",
    "Fingerprint on control panel",
    "Escape car found burned"
  ],

  suspects:[
    {name:"Bank Manager", guilty:false},
    {name:"IT Employee", guilty:true},
    {name:"Cleaner", guilty:false}
  ]
},

{
  title:"🧬 Secret Laboratory",

  intro:"A scientist vanished from a secret lab.",

  clues:[
    "Hidden files deleted",
    "Lab cameras hacked",
    "Unknown chemical traces"
  ],

  suspects:[
    {name:"Researcher", guilty:true},
    {name:"Assistant", guilty:false},
    {name:"Guard", guilty:false}
  ]
},

{
  title:"🚔 Serial Killer Case",

  intro:"A dangerous serial killer left another clue.",

  clues:[
    "A bloody glove was found",
    "Victim received threats",
    "Suspicious car near the scene"
  ],

  suspects:[
    {name:"Taxi Driver", guilty:false},
    {name:"Ex-Friend", guilty:true},
    {name:"Store Owner", guilty:false}
  ]
}

];

let currentCase = 0;
let score = 0;
let time = 30;
let timer;

function loadCase(){

  clearInterval(timer);

  const c = cases[currentCase];

  document.getElementById("title").innerText =
    c.title;

  document.getElementById("intro").innerText =
    c.intro;

  document.getElementById("caseNum").innerText =
    currentCase + 1;

  const cluesDiv =
    document.getElementById("clues");

  cluesDiv.innerHTML = "";

  c.clues.forEach(clue=>{

    cluesDiv.innerHTML += `<p>• ${clue}</p>`;

  });

  const suspectsDiv =
    document.getElementById("suspects");

  suspectsDiv.innerHTML = "";

  c.suspects.forEach(s=>{

    suspectsDiv.innerHTML += `
      <button onclick="checkAnswer(${s.guilty})">
        ${s.name}
      </button>
    `;

  });

  document.getElementById("result").innerHTML =
    "";

  document.getElementById("nextBtn").style.display =
    "none";

  time = 30;

  document.getElementById("time").innerText =
    time;

  timer = setInterval(()=>{

    time--;

    document.getElementById("time").innerText =
      time;

    if(time <= 0){

      clearInterval(timer);

      document.getElementById("result").innerHTML =
        "⏰ Time Over!";

      document.getElementById("nextBtn").style.display =
        "block";
    }

  },1000);

}

function checkAnswer(correct){

  if(correct){

    clearInterval(timer);

    score++;

    document.getElementById("score").innerText =
      score;

    document.getElementById("result").innerHTML =
      "✔️ Case Solved!";

    document.getElementById("nextBtn").style.display =
      "block";
  }

  else{

    document.getElementById("result").innerHTML =
      "❌ Wrong Suspect! Try Again.";

  }

}

function nextCase(){

  currentCase++;

  if(currentCase >= cases.length){

    let message = "";

    if(score === 5){

      message =
        "🏆 Perfect Detective! You solved all cases.";

    }

    else if(score === 4){

      message =
        "🔥 Amazing work detective.";

    }

    else if(score === 3){

      message =
        "🕵️ Good job! But some criminals escaped.";

    }

    else{

      message =
        "❌ Mission Failed. Try again.";

    }

    document.querySelector(".container").innerHTML = `

      <div style="text-align:center;padding:50px;">

        <h1>🎮 Game Finished</h1>

        <h2>${player}'s Score</h2>

        <h1 style="
          font-size:70px;
          color:#facc15;
        ">
          ${score}/5
        </h1>

        <p style="
          font-size:24px;
          margin-top:20px;
          color:#f9a8d4;
        ">
          ${message}
        </p>

      </div>

    `;

    return;
  }

  loadCase();

}

</script>

</body>
</html>
